buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'net.serenity-bdd:serenity-single-page-report:4.3.2'
    }
}

plugins {
    id 'java'
    id 'idea'
    id 'io.freefair.lombok' version '9.2.0'
    id 'net.serenity-bdd.serenity-gradle-plugin' version '4.3.2'
    id 'com.diffplug.spotless' version '8.2.1'
}

repositories {
    mavenCentral()
}

ext{
    serenityVersion = '4.3.2'
    jacksonVersion = '3.0.4'
    assertjVersion = '3.27.7'
    jsonUnitVersion = '5.1.0'
    cucumberVersion = '7.16.0'
    jupiterVersion = '5.10.2'
    junitPlatformVersion = '1.10.2'
    junit = '4.13.2'
}

configurations {
    cucumberRuntime {
        extendsFrom testImplementation
    }
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'

    implementation "tools.jackson.core:jackson-databind:${jacksonVersion}"
    implementation "net.serenity-bdd:serenity-core:${serenityVersion}"
    implementation "net.serenity-bdd:serenity-screenplay:${serenityVersion}"
    implementation "net.serenity-bdd:serenity-screenplay-rest:${serenityVersion}"
    implementation "net.serenity-bdd:serenity-ensure:${serenityVersion}"
    testImplementation "net.serenity-bdd:serenity-junit5:${serenityVersion}"
    testImplementation "org.assertj:assertj-core:${assertjVersion}"
    testImplementation "net.javacrumbs.json-unit:json-unit-assertj:${jsonUnitVersion}"
    testImplementation "io.cucumber:cucumber-junit-platform-engine:${cucumberVersion}"
    testImplementation "org.junit.platform:junit-platform-suite:${junitPlatformVersion}"
    testImplementation "org.junit.jupiter:junit-jupiter-api:${jupiterVersion}"

}
    
tasks.named('test', Test) {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
    }
    systemProperties System.properties as Map
    systemProperty "file.encoding", "UTF-8"
    jvmArgs "-Dfile.encoding=UTF-8"
}

serenity {
    reports = ["single-page-html"]
    testRoot = "qa.rest.screenplay.challenge"
    requirementsDir = "src/test/resources/features"
}

spotless {
    java {
        target("src/*/java/**/*.java")
        googleJavaFormat('1.25.2').aosp()
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

tasks.register('cleanLog') {
    def logFile = file('tyba_auto_backend.log')
    doLast {
        logFile.delete()
        println "Deleted tyba_auto_backend.log file"
    }
}

tasks.named('compileJava') {
    dependsOn 'spotlessApply'
    dependsOn 'cleanLog'
}

tasks.withType(Javadoc).configureEach {
    failOnError = true
    options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.register('openSerenityReport', Exec) {
    group = "serenity bdd"
    description = "Opens the Serenity HTML report in Google Chrome."

    def reportPath = "${projectDir}/target/site/serenity/index.html"

    commandLine 'open', '-a', 'Google Chrome', reportPath
}

gradle.startParameter.continueOnFailure = true

test.finalizedBy(aggregate)

